<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FootTalk — サッカー掲示板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--green:#00C17C;--green-dim:rgba(0,193,124,.12);--red:#FF3B5C;--red-dim:rgba(255,59,92,.12);--amber:#F59E0B;--purple:#7C3AED;--bg:#0D0F0E;--bg2:#161918;--bg3:#1E2220;--border:#2A2E2C;--text:#F0F2F1;--text2:#8A9490;--text3:#4A524E;--font-head:'Bebas Neue',sans-serif;--font-body:'Noto Sans JP',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.app{display:grid;grid-template-columns:220px 1fr;grid-template-rows:54px 1fr;grid-template-areas:"header header" "sidebar main";min-height:100vh}
@media(max-width:768px){.app{grid-template-columns:1fr;grid-template-areas:"header" "main"}.sidebar{display:none}.mobile-nav{display:flex!important}}
.header{grid-area:header;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:8px;cursor:pointer}
.logo-mark{width:32px;height:32px;background:var(--green);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-text{font-family:var(--font-head);font-size:26px;color:var(--text);letter-spacing:1px}
.logo-text span{color:var(--green)}
.btn-new{background:var(--green);color:#000;font-family:var(--font-body);font-weight:700;font-size:13px;border:none;border-radius:20px;padding:7px 16px;cursor:pointer;transition:background .2s,transform .1s}
.btn-new:hover{background:#00d98a}.btn-new:active{transform:scale(.97)}
.sidebar{grid-area:sidebar;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;position:sticky;top:54px;height:calc(100vh - 54px);padding-bottom:80px}
.sidebar-section{padding:16px 0 4px}
.sidebar-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:0 16px;margin-bottom:4px}
.nav-item{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;font-size:13px;color:var(--text2);cursor:pointer;border-left:2px solid transparent;transition:all .15s;gap:8px}
.nav-item:hover{color:var(--text);background:var(--bg3)}.nav-item.active{color:var(--green);border-left-color:var(--green);background:var(--green-dim);font-weight:500}
.nav-icon{font-size:15px;flex-shrink:0}.nav-name{flex:1}
.badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;background:var(--green-dim);color:var(--green);flex-shrink:0}
.badge.live{background:var(--red-dim);color:var(--red);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.sidebar-divider{height:1px;background:var(--border);margin:8px 0}
.main{grid-area:main;display:flex;flex-direction:column;min-height:calc(100vh - 54px)}
.score-ticker{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 12px;overflow-x:auto;display:flex;gap:8px;align-items:center;height:46px;flex-shrink:0;scrollbar-width:none}
.score-ticker::-webkit-scrollbar{display:none}
.ticker-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;flex-shrink:0}
.score-card{display:flex;align-items:center;gap:8px;padding:5px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;white-space:nowrap;flex-shrink:0;font-size:12px;transition:border-color .15s}
.score-card.live-game{border-color:var(--red)}
.score-teams{color:var(--text2)}.score-val{font-size:13px;font-weight:700;color:var(--text)}
.score-min{font-size:11px;color:var(--red);font-weight:700;animation:pulse 1.5s infinite}
.score-status{font-size:11px;color:var(--text3)}
.score-loading{font-size:12px;color:var(--text3);padding:0 8px}
.board-toolbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap}
.board-title{font-family:var(--font-head);font-size:22px;letter-spacing:.5px;color:var(--text);display:flex;align-items:center;gap:8px}
.live-chip{font-size:10px;font-weight:700;background:var(--red-dim);color:var(--red);padding:3px 8px;border-radius:10px;animation:pulse 1.5s infinite;font-family:var(--font-body)}
.sort-tabs{display:flex;gap:4px}
.sort-tab{font-size:12px;padding:5px 12px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;font-family:var(--font-body)}
.sort-tab.active,.sort-tab:hover{background:var(--green-dim);color:var(--green);border-color:var(--green)}
.thread-list{flex:1}
.thread-item{display:flex;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;animation:fadeUp .25s ease both}
.thread-item:hover{background:var(--bg2)}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.thread-num{font-size:11px;color:var(--text3);min-width:22px;padding-top:2px;text-align:right}
.thread-body{flex:1;min-width:0}
.thread-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px}
.tag-live{background:var(--red-dim);color:var(--red)}.tag-hot{background:rgba(245,158,11,.15);color:var(--amber)}
.tag-league{background:var(--green-dim);color:var(--green)}.tag-team{background:rgba(124,58,237,.15);color:var(--purple)}
.tag-new{background:rgba(14,165,233,.15);color:#38BDF8}
.thread-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:5px;line-height:1.45;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.thread-meta{font-size:11px;color:var(--text3);display:flex;gap:10px}
.thread-stats{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:2px;min-width:48px}
.stat-num{font-size:15px;font-weight:700;color:var(--text)}.stat-label{font-size:10px;color:var(--text3)}
.state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 16px;gap:12px;color:var(--text3)}
.state-icon{font-size:36px}.state-msg{font-size:14px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal-overlay.hidden{display:none}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:100%;max-width:480px;padding:24px}
.modal-title{font-family:var(--font-head);font-size:22px;letter-spacing:.5px;margin-bottom:20px;color:var(--text)}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block;font-weight:500}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;color:var(--text);font-family:var(--font-body);transition:border-color .15s;outline:none}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--green)}
.form-select option{background:var(--bg2)}.form-textarea{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.btn-cancel{flex:1;padding:10px;background:transparent;border:1px solid var(--border);border-radius:20px;color:var(--text2);cursor:pointer;font-family:var(--font-body);font-size:14px;transition:all .15s}
.btn-cancel:hover{border-color:var(--text2);color:var(--text)}
.btn-submit{flex:2;padding:10px;background:var(--green);border:none;border-radius:20px;color:#000;font-weight:700;cursor:pointer;font-family:var(--font-body);font-size:14px;transition:background .15s}
.btn-submit:hover{background:#00d98a}.btn-submit:disabled{background:var(--border);color:var(--text3);cursor:not-allowed}
.thread-detail{display:none;flex-direction:column;flex:1}.thread-detail.open{display:flex}
.thread-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px}
.back-btn{background:transparent;border:1px solid var(--border);border-radius:20px;color:var(--text2);font-size:12px;padding:5px 12px;cursor:pointer;font-family:var(--font-body);white-space:nowrap;transition:all .15s;flex-shrink:0;margin-top:2px}
.back-btn:hover{border-color:var(--green);color:var(--green)}
.thread-header-title{font-size:15px;font-weight:500;color:var(--text);line-height:1.45;margin-bottom:4px}
.thread-header-meta{font-size:11px;color:var(--text3)}
.posts-list{flex:1;overflow-y:auto}
.post-item{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:10px;animation:fadeUp .2s ease both}
.post-num{font-size:11px;color:var(--text3);min-width:28px;padding-top:2px;text-align:right}
.post-body{flex:1}.post-name{font-size:11px;color:var(--green);font-weight:500;margin-bottom:3px}
.post-content{font-size:14px;color:var(--text);line-height:1.6;white-space:pre-wrap}
.post-time{font-size:11px;color:var(--text3);margin-top:3px}
.reply-bar{padding:12px 16px;border-top:1px solid var(--border);background:var(--bg2);display:flex;gap:10px;align-items:flex-end}
.reply-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;color:var(--text);font-family:var(--font-body);resize:none;min-height:44px;max-height:120px;outline:none;transition:border-color .15s}
.reply-input:focus{border-color:var(--green)}
.reply-btn{background:var(--green);border:none;border-radius:10px;padding:10px 16px;color:#000;font-weight:700;font-size:13px;cursor:pointer;font-family:var(--font-body);white-space:nowrap;transition:background .15s;flex-shrink:0}
.reply-btn:hover{background:#00d98a}.reply-btn:disabled{background:var(--border);color:var(--text3);cursor:not-allowed}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:150;justify-content:space-around}
.mobile-nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--text3);cursor:pointer;padding:4px 12px;border-radius:8px;transition:color .15s}
.mobile-nav-item.active{color:var(--green)}.m-icon{font-size:20px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:#000;font-weight:700;font-size:13px;padding:10px 20px;border-radius:20px;z-index:300;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="logo" onclick="showList()">
      <div class="logo-mark">⚽</div>
      <span class="logo-text">FOOT<span>TALK</span></span>
    </div>
    <button class="btn-new" onclick="openModal()">＋ スレを立てる</button>
  </header>

  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">メニュー</div>
      <div class="nav-item active" onclick="filterLeague('')"><span class="nav-icon">🏠</span><span class="nav-name">すべて</span></div>
      <div class="nav-item" onclick="filterLeague('hot')"><span class="nav-icon">🔥</span><span class="nav-name">人気スレ</span></div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">リーグ</div>
      <div class="nav-item" onclick="filterLeague('Jリーグ')"><span class="nav-icon">🇯🇵</span><span class="nav-name">Jリーグ</span></div>
      <div class="nav-item" onclick="filterLeague('プレミアリーグ')"><span class="nav-icon">🏴󠁧󠁢󠁥󠁮󠁧󠁿</span><span class="nav-name">プレミアリーグ</span></div>
      <div class="nav-item" onclick="filterLeague('ラ・リーガ')"><span class="nav-icon">🇪🇸</span><span class="nav-name">ラ・リーガ</span></div>
      <div class="nav-item" onclick="filterLeague('ブンデスリーガ')"><span class="nav-icon">🇩🇪</span><span class="nav-name">ブンデスリーガ</span></div>
      <div class="nav-item" onclick="filterLeague('セリエA')"><span class="nav-icon">🇮🇹</span><span class="nav-name">セリエA</span></div>
      <div class="nav-item" onclick="filterLeague('代表・CL')"><span class="nav-icon">🌍</span><span class="nav-name">代表・CL</span></div>
    </div>
  </aside>

  <main class="main">
    <div class="score-ticker" id="scoreTicker">
      <span class="ticker-label">SCORE</span>
      <span class="score-loading" id="scoreLoading">スコア取得中...</span>
    </div>

    <div id="threadListView" style="display:flex;flex-direction:column;flex:1">
      <div class="board-toolbar">
        <div class="board-title" id="boardTitle">全板 <span class="live-chip">● LIVE</span></div>
        <div class="sort-tabs">
          <button class="sort-tab active" onclick="setSort('new',this)">新着</button>
          <button class="sort-tab" onclick="setSort('hot',this)">人気</button>
        </div>
      </div>
      <div class="thread-list" id="threadList">
        <div class="state-box"><div class="state-icon">⚽</div><div class="state-msg">読み込み中...</div></div>
      </div>
    </div>

    <div id="threadDetailView" class="thread-detail">
      <div class="thread-header">
        <button class="back-btn" onclick="showList()">← 戻る</button>
        <div>
          <div class="thread-header-title" id="detailTitle"></div>
          <div class="thread-header-meta" id="detailMeta"></div>
        </div>
      </div>
      <div class="posts-list" id="postsList"></div>
      <div class="reply-bar">
        <textarea class="reply-input" id="replyInput" placeholder="返信を入力... (Enterで投稿)" rows="1" oninput="autoResize(this)"></textarea>
        <button class="reply-btn" id="replyBtn" onclick="submitReply()">投稿</button>
      </div>
    </div>
  </main>
</div>

<nav class="mobile-nav">
  <div class="mobile-nav-item active" onclick="filterLeague('')"><div class="m-icon">🏠</div>ホーム</div>
  <div class="mobile-nav-item" onclick="filterLeague('hot')"><div class="m-icon">🔥</div>人気</div>
  <div class="mobile-nav-item" onclick="openModal()"><div class="m-icon">✏️</div>投稿</div>
  <div class="mobile-nav-item"><div class="m-icon">👤</div>マイ板</div>
</nav>

<div class="modal-overlay hidden" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title">スレを立てる</div>
    <div class="form-group">
      <label class="form-label">タイトル *</label>
      <input class="form-input" id="threadTitle" placeholder="スレのタイトルを入力..." maxlength="100">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">リーグ</label>
        <select class="form-select" id="threadLeague">
          <option value="">選択なし</option>
          <option>Jリーグ</option><option>プレミアリーグ</option><option>ラ・リーガ</option>
          <option>ブンデスリーガ</option><option>セリエA</option><option>代表・CL</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">チーム（任意）</label>
        <input class="form-input" id="threadTeam" placeholder="例: 浦和レッズ">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">最初のコメント（任意）</label>
      <textarea class="form-textarea" id="threadContent" placeholder="スレの内容を入力..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-submit" id="submitBtn" onclick="submitThread()">スレを立てる</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL='https://jvwknomuppgzqrkvwern.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp2d2tub211cHBnenFya3Z3ZXJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjIzMzksImV4cCI6MjA5MzI5ODMzOX0.9Z_HkcWy1eI7VM0xlVCzL7XoNKiygbNT9oJ5qOgQCOs';
const FD_KEY='aec6ef3b399b49b4b656570db8045b92';
const LEAGUES=[2021,2014,2002,2019,2001]; // プレミア,ラリーガ,ブンデス,セリエA,CL

const{createClient}=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_KEY);

let allThreads=[],currentSort='new',currentLeague='',currentThread=null,realtimeSub=null;

// ── スコア取得 ──
async function loadScores(){
  const ticker=document.getElementById('scoreTicker');
  try{
    const today=new Date().toISOString().slice(0,10);

    // LIVE試合を取得
    const liveRes=await Promise.allSettled(
      LEAGUES.map(id=>fetch(`https://api.football-data.org/v4/competitions/${id}/matches?status=IN_PLAY,PAUSED`,
        {headers:{'X-Auth-Token':FD_KEY}}).then(r=>r.json()))
    );
    const live=liveRes.flatMap(r=>r.status==='fulfilled'&&r.value.matches?r.value.matches:[]);

    // 本日終了試合を取得
    const doneRes=await Promise.allSettled(
      LEAGUES.map(id=>fetch(`https://api.football-data.org/v4/competitions/${id}/matches?status=FINISHED&dateFrom=${today}&dateTo=${today}`,
        {headers:{'X-Auth-Token':FD_KEY}}).then(r=>r.json()))
    );
    const done=doneRes.flatMap(r=>r.status==='fulfilled'&&r.value.matches?r.value.matches.slice(0,2):[]);

    document.getElementById('scoreLoading')?.remove();

    if(!live.length&&!done.length){
      ticker.insertAdjacentHTML('beforeend','<span class="score-loading">本日の試合はありません</span>');
      return;
    }
    if(live.length){
      ticker.insertAdjacentHTML('beforeend','<span class="ticker-label" style="margin-left:4px">LIVE</span>');
      live.forEach(m=>ticker.insertAdjacentHTML('beforeend',matchCard(m,true)));
    }
    if(done.length){
      ticker.insertAdjacentHTML('beforeend','<span class="ticker-label" style="margin-left:8px">FT</span>');
      done.forEach(m=>ticker.insertAdjacentHTML('beforeend',matchCard(m,false)));
    }
  }catch(e){
    document.getElementById('scoreLoading') && (document.getElementById('scoreLoading').textContent='スコア取得失敗');
  }
}

function matchCard(m,isLive){
  const h=clip(m.homeTeam.shortName||m.homeTeam.name);
  const a=clip(m.awayTeam.shortName||m.awayTeam.name);
  const hs=m.score?.fullTime?.home??m.score?.halfTime?.home??'-';
  const as=m.score?.fullTime?.away??m.score?.halfTime?.away??'-';
  const min=m.minute?m.minute+"'":m.status==='PAUSED'?'HT':'LIVE';
  const cls=isLive?'score-card live-game':'score-card';
  const st=isLive?`<span class="score-min">${min}</span>`:`<span class="score-status">終了</span>`;
  return `<div class="${cls}"><span class="score-teams">${h} vs ${a}</span><span class="score-val">${hs} - ${as}</span>${st}</div>`;
}

function clip(s){return s&&s.length>8?s.slice(0,8):s||''}

// ── スレッド ──
async function loadThreads(){
  const{data,error}=await db.from('threads').select('*').order('created_at',{ascending:false});
  if(error){
    document.getElementById('threadList').innerHTML='<div class="state-box"><div class="state-icon">⚠️</div><div class="state-msg">読み込みに失敗しました</div></div>';
    return;
  }
  allThreads=data||[];
  renderThreads();
}

function subscribeThreads(){
  realtimeSub=db.channel('threads-ch')
    .on('postgres_changes',{event:'*',schema:'public',table:'threads'},loadThreads)
    .subscribe();
}

function renderThreads(){
  let threads=[...allThreads];
  if(currentLeague&&currentLeague!=='hot') threads=threads.filter(t=>t.league===currentLeague);
  if(currentLeague==='hot'||currentSort==='hot') threads.sort((a,b)=>b.reply_count-a.reply_count);
  if(!threads.length){
    document.getElementById('threadList').innerHTML='<div class="state-box"><div class="state-icon">⚽</div><div class="state-msg">まだスレがありません。最初のスレを立ててみよう！</div></div>';
    return;
  }
  document.getElementById('threadList').innerHTML=threads.map((t,i)=>`
    <div class="thread-item" onclick="openThread('${t.id}')" style="animation-delay:${i*.04}s">
      <div class="thread-num">${i+1}</div>
      <div class="thread-body">
        <div class="thread-tags">${buildTags(t)}</div>
        <div class="thread-title">${esc(t.title)}</div>
        <div class="thread-meta"><span>名無し</span><span>${timeAgo(t.created_at)}</span></div>
      </div>
      <div class="thread-stats"><span class="stat-num">${t.reply_count||0}</span><span class="stat-label">レス</span></div>
    </div>`).join('');
}

function buildTags(t){
  let s='';
  if(t.reply_count>100) s+='<span class="tag tag-hot">🔥 HOT</span>';
  if(t.league) s+=`<span class="tag tag-league">${esc(t.league)}</span>`;
  if(t.team) s+=`<span class="tag tag-team">${esc(t.team)}</span>`;
  if((Date.now()-new Date(t.created_at))/60000<60) s+='<span class="tag tag-new">NEW</span>';
  return s||'<span class="tag tag-league">雑談</span>';
}

async function openThread(id){
  currentThread=allThreads.find(t=>t.id===id);
  if(!currentThread)return;
  document.getElementById('detailTitle').textContent=currentThread.title;
  document.getElementById('detailMeta').textContent=`${currentThread.league||'雑談'} | ${currentThread.reply_count||0}レス | ${timeAgo(currentThread.created_at)}`;
  document.getElementById('threadListView').style.display='none';
  document.getElementById('threadDetailView').classList.add('open');
  document.getElementById('postsList').innerHTML='<div class="state-box"><div class="state-msg">読み込み中...</div></div>';
  const{data}=await db.from('posts').select('*').eq('thread_id',id).order('created_at');
  renderPosts(data||[]);
  if(realtimeSub)db.removeChannel(realtimeSub);
  realtimeSub=db.channel('posts-'+id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'posts',filter:`thread_id=eq.${id}`},
      p=>{appendPost(p.new);document.getElementById('postsList').scrollTop=999999;})
    .subscribe();
}

function renderPosts(posts){
  if(!posts.length){document.getElementById('postsList').innerHTML='<div class="state-box"><div class="state-icon">💬</div><div class="state-msg">最初のレスを投稿しよう！</div></div>';return;}
  document.getElementById('postsList').innerHTML=posts.map((p,i)=>postHTML(p,i+1)).join('');
  document.getElementById('postsList').scrollTop=999999;
}

function appendPost(p){
  document.querySelector('#postsList .state-box')?.remove();
  const n=document.querySelectorAll('.post-item').length+1;
  const d=document.createElement('div');
  d.innerHTML=postHTML(p,n);
  document.getElementById('postsList').appendChild(d.firstElementChild);
}

function postHTML(p,n){
  return `<div class="post-item" style="animation-delay:${Math.min(n*.03,.3)}s">
    <div class="post-num">${n}</div>
    <div class="post-body">
      <div class="post-name">名無しさん</div>
      <div class="post-content">${esc(p.content)}</div>
      <div class="post-time">${timeAgo(p.created_at)}</div>
    </div></div>`;
}

function showList(){
  currentThread=null;
  document.getElementById('threadListView').style.display='flex';
  document.getElementById('threadDetailView').classList.remove('open');
  if(realtimeSub)db.removeChannel(realtimeSub);
  subscribeThreads();loadThreads();
}

async function submitThread(){
  const title=document.getElementById('threadTitle').value.trim();
  const league=document.getElementById('threadLeague').value;
  const team=document.getElementById('threadTeam').value.trim();
  const content=document.getElementById('threadContent').value.trim();
  if(!title){showToast('タイトルを入力してください');return;}
  const btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.textContent='投稿中...';
  const{data,error}=await db.from('threads').insert([{title,league,team}]).select().single();
  if(error){showToast('エラーが発生しました');btn.disabled=false;btn.textContent='スレを立てる';return;}
  if(content&&data){
    await db.from('posts').insert([{thread_id:data.id,content}]);
    await db.from('threads').update({reply_count:1}).eq('id',data.id);
  }
  closeModal();showToast('スレを立てました！');
  btn.disabled=false;btn.textContent='スレを立てる';
  loadThreads();
}

async function submitReply(){
  if(!currentThread)return;
  const content=document.getElementById('replyInput').value.trim();
  if(!content)return;
  const btn=document.getElementById('replyBtn');
  btn.disabled=true;
  const{error}=await db.from('posts').insert([{thread_id:currentThread.id,content}]);
  if(!error){
    const nc=(currentThread.reply_count||0)+1;
    await db.from('threads').update({reply_count:nc}).eq('id',currentThread.id);
    currentThread.reply_count=nc;
    document.getElementById('replyInput').value='';
    document.getElementById('replyInput').style.height='auto';
  }
  btn.disabled=false;
}

function filterLeague(l){
  currentLeague=l;
  document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
  const T={'':'全板','hot':'人気スレ','Jリーグ':'Jリーグ板','プレミアリーグ':'プレミア板','ラ・リーガ':'ラ・リーガ板','ブンデスリーガ':'ブンデス板','セリエA':'セリエA板','代表・CL':'代表・CL板'};
  document.getElementById('boardTitle').innerHTML=(T[l]||l+'板')+' <span class="live-chip">● LIVE</span>';
  renderThreads();
}

function setSort(s,el){
  currentSort=s;
  document.querySelectorAll('.sort-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');renderThreads();
}

function openModal(){document.getElementById('modalOverlay').classList.remove('hidden');document.getElementById('threadTitle').focus();}
function closeModal(){
  document.getElementById('modalOverlay').classList.add('hidden');
  ['threadTitle','threadTeam','threadContent'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('threadLeague').value='';
}
function closeModalOutside(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function timeAgo(iso){const s=(Date.now()-new Date(iso))/1000;if(s<60)return'たった今';if(s<3600)return Math.floor(s/60)+'分前';if(s<86400)return Math.floor(s/3600)+'時間前';return Math.floor(s/86400)+'日前';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}

document.getElementById('replyInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submitReply();}
});

document.addEventListener('DOMContentLoaded',()=>{
  loadScores();
  loadThreads();
  subscribeThreads();
  setInterval(()=>{
    const t=document.getElementById('scoreTicker');
    t.innerHTML='<span class="ticker-label">SCORE</span><span class="score-loading" id="scoreLoading">更新中...</span>';
    loadScores();
  },60000);
});
</script>
</body>
</html>
